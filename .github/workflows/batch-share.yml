name: Batch Share Workflow

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-batch-share:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests httpx colorama retrying playwright python-dotenv

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Create directories
        run: mkdir -p config cache

      - name: Create .env file
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          QUARK_COOKIES: ${{ secrets.QUARK_COOKIES }}
          COUNT: ${{ secrets.COUNT || '5' }}
        run: |
          printf "WECHAT_WEBHOOK_URL=%s\nQUARK_COOKIES=%s\nCOUNT=%s\n" "$WECHAT_WEBHOOK_URL" "$QUARK_COOKIES" "$COUNT" > .env

      - name: Run batch share
        run: python batch_share.py

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: function_runtime.log
          retention-days: 3
